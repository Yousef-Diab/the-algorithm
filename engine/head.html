<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Algorithm — Learning how price is really delivered</title>
<style>
  :root{
    --bg:#0b0e14; --bg2:#11151f; --panel:#161b28; --panel2:#1c2333;
    --border:#232b3d; --text:#d7dce6; --muted:#8a93a6; --dim:#5c6478;
    --accent:#4f8cff; --accent2:#7aa5ff; --gold:#e8b45a; --green:#43c78b; --red:#e2606c;
    --radius:12px;
    --font:'Segoe UI',system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:16px;line-height:1.65}

  /* ---------- layout ---------- */
  #app{display:flex;min-height:100vh}
  #sidebar{width:320px;min-width:320px;background:var(--bg2);border-right:1px solid var(--border);
    height:100vh;position:sticky;top:0;overflow-y:auto;padding:0 0 40px}
  #main{flex:1;min-width:0;padding:0 0 80px}
  .inner{max-width:880px;margin:0 auto;padding:0 32px}

  /* ---------- sidebar ---------- */
  .brand{padding:22px 20px 16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:5}
  .brand h1{font-size:17px;letter-spacing:.4px}
  .brand h1 span{color:var(--gold)}
  .brand .sub{font-size:12px;color:var(--muted);margin-top:2px}
  .progress-wrap{margin-top:12px}
  .progress-bar{height:6px;background:var(--panel2);border-radius:3px;overflow:hidden}
  .progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:3px;transition:width .4s}
  .progress-label{font-size:11px;color:var(--muted);margin-top:5px}
  .month-group{margin-top:6px}
  .month-head{display:flex;align-items:center;justify-content:space-between;padding:12px 20px 6px;cursor:pointer;user-select:none}
  .month-head h2{font-size:12px;text-transform:uppercase;letter-spacing:1.2px;color:var(--gold)}
  .month-head .count{font-size:11px;color:var(--dim)}
  .nav-lesson{display:flex;align-items:center;gap:10px;padding:8px 20px;cursor:pointer;font-size:13.5px;color:var(--muted);
    border-left:3px solid transparent;transition:background .15s,color .15s}
  .nav-lesson:hover{background:var(--panel);color:var(--text)}
  .nav-lesson.active{background:var(--panel);color:var(--text);border-left-color:var(--accent)}
  .nav-lesson .dot{width:16px;height:16px;min-width:16px;border-radius:50%;border:1.5px solid var(--dim);
    display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent}
  .nav-lesson.done .dot{background:var(--green);border-color:var(--green);color:#08130d}
  .nav-lesson .n{color:var(--dim);font-size:11px;min-width:16px}

  /* ---------- lesson header ---------- */
  .lesson{display:none;animation:fadeIn .35s ease}
  .lesson.visible{display:block}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .lesson-hero{padding:44px 0 26px;border-bottom:1px solid var(--border);margin-bottom:28px}
  .crumb{font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:var(--gold);margin-bottom:10px}
  .lesson-hero h2{font-size:32px;line-height:1.2;font-weight:650}
  .lesson-hero .desc{color:var(--muted);margin-top:10px;font-size:15px;max-width:640px}
  .lesson-video{display:inline-flex;align-items:center;gap:9px;margin:-8px 0 28px;padding:9px 15px;
    background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
    color:var(--text);text-decoration:none;font-size:13.5px;font-weight:550;transition:border-color .15s,background .15s}
  .lesson-video:hover{background:var(--panel2);border-color:var(--red)}
  .lesson-video .lv-ico{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;
    min-width:22px;border-radius:6px;background:var(--red);color:#fff;font-size:10px}
  .lesson-video .lv-sub{color:var(--muted);font-weight:400}

  /* ---------- content blocks ---------- */
  .lesson h3{font-size:20px;margin:34px 0 12px;color:var(--accent2)}
  .lesson h4{font-size:16px;margin:24px 0 8px;color:var(--gold)}
  .lesson p{margin:10px 0;color:var(--text)}
  .lesson ul,.lesson ol{margin:10px 0 10px 22px}
  .lesson li{margin:6px 0}
  .lesson strong{color:#fff}
  .callout{background:var(--panel);border:1px solid var(--border);border-left:3px solid var(--accent);
    border-radius:var(--radius);padding:14px 18px;margin:18px 0;font-size:15px}
  .callout.rule{border-left-color:var(--gold)}
  .callout.warn{border-left-color:var(--red)}
  .callout .tag{display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:1.3px;
    color:var(--accent);margin-bottom:6px;font-weight:700}
  .callout.rule .tag{color:var(--gold)}
  .callout.warn .tag{color:var(--red)}
  .kv{display:grid;grid-template-columns:150px 1fr;gap:0;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin:18px 0;font-size:14.5px}
  .kv>div{padding:9px 14px;border-bottom:1px solid var(--border)}
  .kv>div:nth-child(odd){background:var(--panel);color:var(--gold);font-weight:600}
  .kv>div:nth-last-child(-n+2){border-bottom:none}

  /* flip cards for definitions */
  .flip-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin:18px 0}
  .flip{perspective:900px;height:150px;cursor:pointer}
  .flip-in{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d}
  .flip.flipped .flip-in{transform:rotateY(180deg)}
  .flip-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--radius);
    display:flex;align-items:center;justify-content:center;text-align:center;padding:14px;font-size:14px}
  .flip-front{background:var(--panel2);border:1px solid var(--border);font-weight:650;color:var(--accent2)}
  .flip-back{background:var(--panel);border:1px solid var(--accent);transform:rotateY(180deg);color:var(--text);font-size:13px}
  .flip-hint{font-size:11px;color:var(--dim);text-align:center;margin-top:-8px;margin-bottom:14px}

  /* ---------- images ---------- */
  .fig{margin:20px 0}
  .fig img{max-width:100%;border-radius:var(--radius);border:1px solid var(--border);cursor:zoom-in;display:block;transition:transform .2s}
  .fig img:hover{transform:scale(1.005)}
  .fig figcaption{font-size:12.5px;color:var(--muted);margin-top:7px}
  .gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin:18px 0}
  .gallery .fig{margin:0}
  .gallery img{height:160px;width:100%;object-fit:cover;object-position:top left}
  #lightbox{position:fixed;inset:0;background:rgba(5,7,12,.94);display:none;align-items:center;justify-content:center;z-index:100;cursor:zoom-out;flex-direction:column;gap:10px}
  #lightbox.open{display:flex}
  #lightbox img{max-width:94vw;max-height:88vh;border-radius:8px}
  #lightbox .lb-cap{color:var(--muted);font-size:13px}

  /* ---------- quiz ---------- */
  .quiz{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin:34px 0 10px}
  .quiz h3{margin:0 0 4px;color:var(--gold);font-size:18px}
  .quiz .q-sub{font-size:13px;color:var(--muted);margin-bottom:16px}
  .q{margin:18px 0}
  .q .q-text{font-weight:600;margin-bottom:10px}
  .q .opt{display:block;width:100%;text-align:left;background:var(--panel2);border:1px solid var(--border);color:var(--text);
    padding:10px 14px;border-radius:8px;margin:6px 0;cursor:pointer;font-size:14.5px;font-family:var(--font);transition:border-color .15s,background .15s}
  .q .opt:hover{border-color:var(--accent)}
  .q .opt.correct{border-color:var(--green);background:rgba(67,199,139,.12)}
  .q .opt.wrong{border-color:var(--red);background:rgba(226,96,108,.12)}
  .q .opt:disabled{cursor:default;opacity:.85}
  .q .expl{display:none;font-size:13.5px;color:var(--muted);margin-top:8px;padding:10px 12px;background:var(--bg2);border-radius:8px;border-left:3px solid var(--green)}
  .q .expl.show{display:block}

  /* ---------- footer nav ---------- */
  .lesson-footer{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-top:36px;padding-top:22px;border-top:1px solid var(--border);flex-wrap:wrap}
  .btn{background:var(--panel2);color:var(--text);border:1px solid var(--border);padding:10px 18px;border-radius:9px;
    cursor:pointer;font-size:14px;font-family:var(--font);transition:border-color .15s,background .15s}
  .btn:hover{border-color:var(--accent)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
  .btn.primary:hover{background:var(--accent2)}
  .btn.done-btn.marked{background:var(--green);border-color:var(--green);color:#08130d;font-weight:700}

  /* ---------- home ---------- */
  #home .hero{padding:64px 0 30px}
  #home .hero h2{font-size:42px;line-height:1.15;font-weight:700}
  #home .hero h2 em{font-style:normal;color:var(--gold)}
  #home .hero p{color:var(--muted);margin-top:14px;max-width:600px;font-size:16.5px}
  .month-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px;margin:26px 0}
  .mcard{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:border-color .15s,transform .15s}
  .mcard:hover{border-color:var(--accent);transform:translateY(-2px)}
  .mcard .m-num{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold)}
  .mcard h3{margin:6px 0 8px;font-size:17px;color:var(--text)}
  .mcard p{font-size:13px;color:var(--muted)}
  .mcard .m-prog{font-size:11.5px;color:var(--dim);margin-top:12px}
  .notice{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin:8px 0 40px;font-size:14px;color:var(--muted)}
  .notice b{color:var(--gold)}

  /* mobile */
  #menu-toggle{display:none;position:fixed;top:14px;left:14px;z-index:60;background:var(--panel);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 12px;cursor:pointer;font-size:15px}
  @media(max-width:900px){
    #sidebar{position:fixed;left:0;top:0;z-index:50;transform:translateX(-100%);transition:transform .25s;width:300px;min-width:300px}
    #sidebar.open{transform:none;box-shadow:0 0 60px rgba(0,0,0,.6)}
    #menu-toggle{display:block}
    .inner{padding:0 18px}
    #main{padding-top:52px}
    .lesson-hero h2{font-size:25px}
  }
  ::-webkit-scrollbar{width:9px}
  ::-webkit-scrollbar-thumb{background:var(--panel2);border-radius:5px}
  ::-webkit-scrollbar-track{background:transparent}
</style>
</head>
